version: '3.8'

networks:
  hkgold-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:
  # 1. DATABASE SYSTEM (Shared MySQL Engine)
  db:
    image: mysql:8.0
    container_name: hkgold-mysql
    restart: always
    environment:
      MYSQL_DATABASE: hkgold_vip_db
      MYSQL_ROOT_PASSWORD: root_password_super_secure
    ports:
      - "3306:3306" # Dibuka ke localhost agar Flyenv/DBeaver bisa remote
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hkgold-network

  # 2. CACHE & QUEUE SYSTEM (Redis for BullMQ)
  redis:
    image: redis:7-alpine
    container_name: hkgold-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - hkgold-network

