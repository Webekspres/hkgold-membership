# HK Gold Membership — Docker infra (port non-default agar tidak bentrok)
#
# Jalankan infra:
#   docker compose up -d
#
# Akses:
#   MySQL (dari host)     → 127.0.0.1:33068
#   Redis (dari host)     → 127.0.0.1:6381
#   MinIO API             → http://127.0.0.1:9002
#   MinIO Console         → http://127.0.0.1:9003
#   phpMyAdmin            → http://localhost:8088
#   Laravel (lokal)       → cd apps/backoffice-filament && php artisan serve --port=8800
#
# Mode full-docker (Laravel di container):
#   docker compose --profile full up -d
#   http://localhost:8811

networks:
  hkgold-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:

services:
  db:
    image: mysql:8.0
    container_name: hkgold-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_super_secure
      MYSQL_DATABASE: hkgold_backoffice_filament
    ports:
      - "33068:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - hkgold-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password_super_secure"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hkgold-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    networks:
      - hkgold-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hkgold-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hkgold_minio
      MINIO_ROOT_PASSWORD: hkgold_minio_secret
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    networks:
      - hkgold-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: hkgold-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ALIAS: local
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: hkgold_minio
      MINIO_ROOT_PASSWORD: hkgold_minio_secret
      MINIO_BUCKET: mala-emas-media
    volumes:
      - ./docker/minio/init-bucket.sh:/init-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    networks:
      - hkgold-network
    restart: "no"

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: hkgold-phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password_super_secure
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hkgold-network

  backoffice:
    profiles: ["full"]
    image: webdevops/php-nginx:8.3-alpine
    container_name: hkgold-backoffice-filament
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/backoffice-filament:/app
      - ./apps/backoffice-filament/.env.docker:/app/.env:ro
    ports:
      - "8811:80"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      PHP_MEMORY_LIMIT: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hkgold-network
