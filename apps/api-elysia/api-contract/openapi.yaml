    get:
      tags:
        - Reward
      summary: Get reward list with filters and pagination
      description: |
        Mendapatkan daftar reward dengan filter dan cursor pagination.

        Filter yang tersedia:
        - categoryIds: filter berdasarkan category IDs (array)
        - pointsMin/pointsMax: filter berdasarkan rentang poin
        - branchId: filter berdasarkan stok di cabang tertentu
        - search: pencarian teks pada nama/deskripsi
        - sortBy/sortOrder: urutkan by sku (default), name, atau points
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
          description: Jumlah item per halaman (1-50)
          example: 15
        - name: cursor
          in: query
          schema:
            type: string
          description: Base64-encoded cursor untuk halaman berikutnya
          example: "eyJzY3UiOiJFVkMtMDAxIiwiaWQiOiJhYmMifQ=="
        - name: categoryIds
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filter berdasarkan category IDs
          example: [1, 2]
        - name: pointsMin
          in: query
          schema:
            type: integer
            minimum: 0
          description: Filter minimal poin yang dibutuhkan
          example: 1000
        - name: pointsMax
          in: query
          schema:
            type: integer
            minimum: 0
          description: Filter maksimal poin yang dibutuhkan
          example: 5000
        - name: branchId
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filter berdasarkan branch ID
          example: 1
        - name: search
          in: query
          schema:
            type: string
          description: Pencarian teks pada nama/deskripsi reward
          example: voucher
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [sku, name, points]
            default: sku
          description: Field untuk mengurutkan list reward
          example: sku
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Arah pengurutan
          example: asc
      responses:
        '200':
          description: List reward berhasil diambil
          content:
            application/json:
              schema:
                allOf:
