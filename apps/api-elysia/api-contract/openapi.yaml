  /api/branch:
    get:
      tags:
        - Branch
      summary: List branch (cursor pagination)
      description: |
        Mendapatkan daftar branch dengan cursor pagination.
        
        Cursor adalah base64-encoded object dengan format: `{"id": number, "name": string}`
        - `q`: cari nama/alamat (efektif jika panjang > 2)
        - `city`: filter nama kota (normalized address)
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
          description: Jumlah item per halaman (1-50)
          example: 15
        - name: cursor
          in: query
          schema:
            type: string
          description: Base64-encoded cursor untuk halaman berikutnya
          example: "eyJpZCI6MTUsIm5hbWUiOiJISyBHb2xkIEpha2FydGEifQ=="
        - name: q
          in: query
          schema:
            type: string
          description: Cari nama atau alamat (diterapkan jika panjang > 2)
          example: "jakarta"
        - name: city
          in: query
          schema:
            type: string
          description: Filter nama kota
          example: "Jakarta Pusat"
      responses:
        '200':
          description: List branch berhasil diambil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BranchListResponse'
