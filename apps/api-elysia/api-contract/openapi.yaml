            enum: [NEWS, EVENT]
            default: NEWS
          description: Filter berdasarkan type content
          example: "NEWS"
        - name: includeArchived
          in: query
          schema:
            type: string
            enum: [true, false]
            default: "false"
          description: Include archived content
          example: "false"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
          description: Jumlah item per halaman (1-50)
          example: 15
        - name: cursor
          in: query
          schema:
