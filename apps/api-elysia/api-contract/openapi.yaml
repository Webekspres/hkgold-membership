  /api/content:
    get:
      tags:
        - Content
      summary: List content (cursor pagination)
      description: |
        Mendapatkan daftar content dengan cursor pagination.
        
        - Type: NEWS atau EVENT
        - Cursor format: base64-encoded `{"id": "uuid", "createdAt": "timestamp"}`
        - `q`: search title (efektif jika panjang > 2)
        - `dateFrom`/`dateTo`: NEWS filter `createdAt`, EVENT filter `eventDate`
      security: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [NEWS, EVENT]
            default: NEWS
          description: Filter berdasarkan type content
          example: "NEWS"
        - name: includeArchived
          in: query
          schema:
            type: string
            enum: [true, false]
            default: "false"
          description: Include archived content
          example: "false"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
          description: Jumlah item per halaman (1-50)
          example: 15
        - name: cursor
          in: query
          schema:
            type: string
          description: Base64-encoded cursor untuk halaman berikutnya
          example: "eyJpZCI6ImFiYzEyMy0xMjMtNDU2Iiwic2x1ZyI6InByb21vLXRlc3QifQ=="
        - name: q
          in: query
          schema:
            type: string
          description: Cari judul (diterapkan jika panjang > 2)
          example: "emas"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Awal rentang tanggal (ISO date)
          example: "2026-01-01"
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Akhir rentang tanggal (ISO date, inclusive end-of-day)
          example: "2026-12-31"
      responses:
        '200':
          description: List content berhasil diambil
          content:
            application/json:
