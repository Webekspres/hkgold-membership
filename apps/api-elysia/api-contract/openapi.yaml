      description: |
        Mendapatkan daftar content dengan cursor pagination.
        
        - Type: NEWS atau EVENT
        - Cursor format: base64-encoded `{"id": "uuid", "createdAt": "timestamp"}`
        - `q`: search title (efektif jika panjang > 2)
        - `dateFrom`/`dateTo`: NEWS filter `createdAt`, EVENT filter `eventDate`
      security: []
      parameters:
        - name: type
