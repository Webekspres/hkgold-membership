# FlyEnv nginx — salin blok "location ^~ /livewire" ke vhost nginx site
# (FlyEnv → Site → hkgoldadmin.test → Config), SEBELUM blok static .js/.css

# Livewire dynamic JS/CSS — jangan ditangkap location static .js FlyEnv
location ^~ /livewire {
    try_files $uri /index.php?$query_string;
}

location / {
    try_files $uri $uri/ /index.php?$query_string;
}
