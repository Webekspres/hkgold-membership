# Nginx Staging Configuration - HK GOLD VIP
# Domain Backoffice: staging.hkgoldvip.com (Filament)
# Domain API: api.staging.hkgoldvip.com (ElysiaJS)
#
# Certbot (sekali di VPS, setelah DNS A record hidup):
#   certbot certonly --webroot -w /var/www/certbot \
#     -d staging.hkgoldvip.com -d api.staging.hkgoldvip.com

server {
    listen 80;
    listen [::]:80;
    server_name staging.hkgoldvip.com api.staging.hkgoldvip.com;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# Backoffice Filament (staging.hkgoldvip.com)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.hkgoldvip.com;

    ssl_certificate /etc/letsencrypt/live/staging.hkgoldvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hkgoldvip.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 64M;

    location / {
        proxy_pass http://backoffice:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -----------------------------------------------------------------------------
# API ElysiaJS (api.staging.hkgoldvip.com)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.staging.hkgoldvip.com;

    ssl_certificate /etc/letsencrypt/live/staging.hkgoldvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hkgoldvip.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 64M;

    location / {
        proxy_pass http://api-elysia:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
