# Host nginx — phpMyAdmin (HTTPS + basic auth)
# Upstream: docker phpMyAdmin di 127.0.0.1:8088
#
# Install (butuh root):
#   sudo cp docker/nginx/phpmyadmin.hkgoldvip.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/phpmyadmin.hkgoldvip.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d phpmyadmin.hkgoldvip.com

server {
    listen 80;
    listen [::]:80;
    server_name phpmyadmin.hkgoldvip.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phpmyadmin.hkgoldvip.com;

    # Diisi/ di-update certbot; placeholder path sampai cert terbit
    ssl_certificate /etc/letsencrypt/live/phpmyadmin.hkgoldvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phpmyadmin.hkgoldvip.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64M;

    auth_basic "HK Gold phpMyAdmin";
    auth_basic_user_file /etc/nginx/.htpasswd-phpmyadmin;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
